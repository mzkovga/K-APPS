<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashLingo - Login</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <div class="auth-container">
        <div class="bento-card auth-card">
            
            <div id="login-view">
                <div class="auth-header">
                    <h1>FlashLingo 🦖</h1>
                    <p>Bienvenido de nuevo</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Usuario</label>
                        <input type="text" id="login-username" class="form-control" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" class="form-control" required autocomplete="current-password">
                    </div>
                    <div id="login-error" class="error-message"></div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 16px;">Entrar</button>
                                <br>
            <!-- Botón elástico para regresar al Hub Central -->
            <a href="../index.php" class="btn-back-hub">Volver al Panel Central</a>
                </form>
                <div class="toggle-auth">
                    ¿No tienes cuenta? <span id="go-to-register">Regístrate aquí</span>
                </div>
            </div>

            <div id="register-view" style="display: none;">
                <div class="auth-header">
                    <h1>Nuevo Explorador</h1>
                    <p>Crea tu cuenta local</p>
                </div>
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-username">Nuevo Usuario</label>
                        <input type="text" id="reg-username" class="form-control" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" id="reg-password" class="form-control" required autocomplete="new-password">
                    </div>
                    <div id="register-error" class="error-message"></div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 16px;">Crear Cuenta</button>
                </form>
                <div class="toggle-auth">
                    ¿Ya tienes cuenta? <span id="go-to-login">Inicia sesión</span>
                </div>
            </div>

        </div>
    </div>

    <script src="assets/js/db.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
