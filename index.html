<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashLingo - Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* Estilos adicionales específicos para el Dashboard */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
        }
        .stat-box {
            text-align: center;
            padding: 16px;
            border-radius: 16px;
            background-color: var(--bg-color);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-color);
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .section-title {
            padding: 0 24px;
            max-width: 1200px;
            margin: 24px auto 0 auto;
            font-size: 1.5rem;
        }
        /* Estilo para las tarjetas de módulos (inyectadas por JS) */
        .module-card {
            cursor: pointer;
        }
        .module-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        .module-progress {
            margin-top: auto;
            padding-top: 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        /* Estilo para el banner del mini-curso */
        .course-banner {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            cursor: pointer;
            grid-column: 1 / -1;
        }
        .course-banner p {
            color: rgba(255,255,255,0.9);
            margin-top: 8px;
        }
        .course-banner .btn-banner {
            background-color: white;
            color: var(--accent-color);
            border: none;
            width: auto;
        }
        .course-banner .btn-banner:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <div>
            <h1 id="user-greeting">Hola, Explorador</h1>
            <p>¿Qué vamos a aprender hoy?</p>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" class="btn btn-secondary" style="padding: 10px 16px;">🌙</button>
            <button onclick="window.logout()" class="btn btn-secondary" style="padding: 10px 16px;">Salir</button>
        </div>
    </header>

    <main>
        <!-- Estadísticas y Banner del Curso -->
        <section class="bento-grid">
            
            <!-- Progreso -->
            <div class="bento-card" style="grid-column: 1 / -1;">
                <h2 style="margin-bottom: 16px;">Tu Progreso</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div id="stat-streak" class="stat-value">0🔥</div>
                        <div class="stat-label">Racha de días</div>
                    </div>
                    <div class="stat-box">
                        <div id="stat-sessions" class="stat-value">0</div>
                        <div class="stat-label">Sesiones completadas</div>
                    </div>
                </div>
            </div>

            <!-- NUEVO: Banner del Mini-Curso -->
            <div class="bento-card course-banner" onclick="window.location.href='guide.html'">
                <div>
                    <h2>🧠 Mini-Curso: La Mega Template</h2>
                    <p>La guía rápida con la estructura base del inglés. Consúltala antes de practicar.</p>
                </div>
                <button class="btn btn-banner">Ver Guía ➔</button>
            </div>

        </section>

        <h2 class="section-title">Módulos de Práctica</h2>
        
        <!-- Grid de Módulos (Llenado por ui.js) -->
        <section id="modules-container" class="bento-grid">
            <!-- Las tarjetas de los módulos se inyectarán aquí -->
        </section>
    </main>

    <!-- Scripts: Orden estricto -->
    <script src="assets/js/db.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/ui.js"></script>
</body>
</html>
